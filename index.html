          <dd>메타 태그, 구조화 데이터(JSON-LD), Lighthouse 성능 점수, AI 검색 준비도(인용 가능성, 답변 추출 적합성 등)를 종합 진단합니다.</dd>
          <dt><strong>점수는 어떻게 계산되나요?</strong></dt>
          <dd>Google Lighthouse 실측 데이터와 AI 분석을 결합한 하이브리드 방식으로 각 축의 점수를 독립 산출합니다.</dd>
          <dt><strong>AEO 점수가 낮으면 어떻게 개선하나요?</strong></dt>
          <dd>FAQ 등 Q&A 구조 콘텐츠를 추가하고, FAQPage 스키마를 적용하면 AI가 답변을 추출하기 쉬워집니다.</dd>
          <dt><strong>GEO 점수가 낮으면 어떻게 개선하나요?</strong></dt>
          <dd>브랜드 정보를 명확히 하고 AI 크롤러(GPTBot 등) 접근을 허용하면 생성형 검색에서의 인용 가능성이 높아집니다.</dd>
          <dt><strong>구조화 데이터(JSON-LD)란?</strong></dt>
          <dd>검색엔진과 AI가 페이지 내용을 정확히 이해할 수 있도록 Schema.org 표준에 따라 정보를 표현하는 코드입니다.</dd>
          <dt><strong>Lighthouse 점수와 SEO 점수는 다른 건가요?</strong></dt>
          <dd>네. Lighthouse는 Google 기술 점수이고, SearchTune OS SEO 점수는 크롤링·인덱싱·스니펫·구조화 데이터 등을 종합 평가한 자체 점수입니다.</dd>
          <dt><strong>분석 결과를 받아볼 수 있나요?</strong></dt>
          <dd>이메일을 등록하시면 맞춤 개선 가이드와 상세 리포트를 받아보실 수 있습니다.</dd>
        </dl>
        <h2>왜 SEO만으로는 부족한가요?</h2>
        <p>검색 환경이 빠르게 변하고 있습니다. 이제 웹사이트는 전통 검색엔진 가시성뿐 아니라, AI 답변 추출 적합성과 생성형 검색 엔진에서의 발견·인용·참조 준비도까지 함께 점검해야 합니다.</p>
        <h2>SearchTune OS의 4가지 진단 기능</h2>
        <ul>
          <li><strong>SEO 진단:</strong> 메타 태그, 구조화 데이터, Canonical, Sitemap 등 기술 SEO를 점검합니다.</li>
          <li><strong>AEO 준비도:</strong> ChatGPT, Perplexity, 뤼튼, 클로바X, 코파일럿, Gemini 등 AI가 내 콘텐츠를 답변으로 인용할 수 있는지 분석합니다.</li>
          <li><strong>GEO 가시성:</strong> Google SGE, Naver Cue:, Bing Copilot 등 생성형 검색에서 출처로 선택될 준비가 되었는지 평가합니다.</li>
          <li><strong>Lighthouse 실측:</strong> 모바일·데스크톱 성능, 접근성, SEO 점수를 Google PSI API로 실시간 측정합니다.</li>
        </ul>
        <h2>어떻게 점수를 계산하나요?</h2>
        <p>Google Lighthouse 실측 데이터, 규칙 기반 평가, LLM 평가를 혼합한 하이브리드 방식으로 SEO·AEO·GEO 각 축의 점수를 독립적으로 산출합니다. 공식 데이터와 자체 추정의 차이를 투명하게 구분합니다.</p>
